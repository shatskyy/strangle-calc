<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strangle Calculator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1a2e;
  color: #c8ccd4;
  font-family: 'Courier New', Courier, monospace;
  font-size: 13px;
  padding: 16px 20px;
  min-height: 100vh;
}

h1 {
  color: #5b8de8;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 14px;
  border-bottom: 1px solid #1e2240;
  padding-bottom: 8px;
}

/* ── Input panel ── */
.input-panel {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.ta-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.ta-label {
  color: #4a6080;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

textarea {
  background: #0f0f1e;
  border: 1px solid #1e2240;
  color: #d0d8e8;
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
  line-height: 1.5;
  padding: 7px 9px;
  resize: vertical;
  height: 190px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s;
}
textarea:focus { border-color: #3a5090; }

.controls {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}

button.calc-btn {
  background: #1e2c60;
  border: 1px solid #3a5090;
  color: #7aabff;
  cursor: pointer;
  font-family: 'Courier New', Courier, monospace;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 5px 18px;
  text-transform: uppercase;
  transition: background 0.12s;
}
button.calc-btn:hover { background: #2a3d80; }
button.calc-btn:active { background: #354ca0; }

.error-msg {
  color: #e05050;
  font-size: 11px;
}

/* ── Results ── */
.results { display: flex; flex-direction: column; gap: 22px; }

.section-title {
  color: #4a6080;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

/* ── Table ── */
table {
  border-collapse: collapse;
  width: 100%;
  margin-bottom: 10px;
}

thead tr.group-row th {
  background: #0c0c1a;
  color: #3a5070;
  font-size: 10px;
  letter-spacing: 2px;
  padding: 3px 8px;
  text-align: center;
  text-transform: uppercase;
  border-bottom: 1px solid #1a1a30;
}
thead tr.group-row th.g-atm   { color: #4a7080; border-bottom-color: #2a3050; }
thead tr.group-row th.g-fly   { color: #4a6090; border-bottom-color: #2a3060; }
thead tr.group-row th.g-strng { color: #208080; border-bottom-color: #1a4040; }

thead tr.col-row th {
  background: #0f0f20;
  border-bottom: 1px solid #1e2240;
  color: #344060;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 3px 8px;
  text-align: right;
  text-transform: uppercase;
  white-space: nowrap;
}
thead tr.col-row th:first-child { text-align: left; }

tbody tr { border-bottom: 1px solid #13132a; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover td { background: #141428; }
tbody tr:hover td input { background: transparent; }

tbody tr.crossed td            { background: #251810; }
tbody tr.crossed:hover td      { background: #2d1e12; }
tbody tr.crossed td.col-tenor  { color: #e08030; }

td {
  padding: 2px 4px;
  white-space: nowrap;
  vertical-align: middle;
}
td.col-tenor {
  color: #5070a0;
  text-align: left;
  min-width: 42px;
  padding: 2px 10px 2px 4px;
}

/* ── Editable vol inputs ── */
td input {
  background: transparent;
  border: none;
  border-bottom: 1px solid transparent;
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
  outline: none;
  padding: 2px 2px 1px;
  text-align: right;
  width: 58px;
  transition: border-bottom-color 0.1s;
}
td input:focus { border-bottom-color: #2a4878; }
td input::placeholder { color: #252545; }

/* color classes applied to inputs */
.v-src  { color: #e8e8f0; }
.v-calc { color: #4fc3f7; }
.v-none { color: #252545; }

/* ── Output block ── */
.output-wrap {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.output-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.output-label {
  color: #344060;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

button.copy-btn {
  background: transparent;
  border: 1px solid #1e3050;
  color: #3a6090;
  cursor: pointer;
  font-family: 'Courier New', Courier, monospace;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 2px 10px;
  text-transform: uppercase;
  transition: all 0.12s;
}
button.copy-btn:hover  { border-color: #3a5090; color: #5a90c0; }
button.copy-btn.copied { border-color: #206040; color: #30c060; }

.output-text {
  background: #0c0c1a;
  border: 1px solid #1a1a30;
  color: #5090a0;
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
  line-height: 1.6;
  padding: 7px 9px;
  white-space: pre;
}
</style>
</head>
<body>

<h1>FX Strangle Calculator</h1>

<div class="input-panel">
  <div class="ta-wrap">
    <div class="ta-label">ATM Run</div>
    <textarea id="ta-atm" spellcheck="false"
      placeholder="Paste ATM run here&#10;e.g. USD/CHF NYK ATM&#10;1M 6.025/6.6&#10;..."></textarea>
  </div>
  <div class="ta-wrap">
    <div class="ta-label">Fly Run(s) — paste one or two deltas</div>
    <textarea id="ta-fly" spellcheck="false"
      placeholder="Paste fly run(s) here&#10;e.g. USD/CHF NYK 10D FLY&#10;1M 0.475/0.725&#10;...&#10;&#10;Separate two deltas with a blank line"></textarea>
  </div>
</div>

<div class="controls">
  <button class="calc-btn" id="btn-calc">Calculate</button>
  <span class="error-msg" id="err"></span>
</div>

<div class="results" id="results"></div>

<script>
// ── Constants ─────────────────────────────────────────────────────────────

const TENOR_ORDER = ['1W','2W','3W','1M','2M','3M','4M','5M','6M','9M','1Y','18M','2Y','3Y','5Y'];
const TENOR_RANK  = Object.fromEntries(TENOR_ORDER.map((t, i) => [t, i]));

function tenorRank(t) {
  const r = TENOR_RANK[t.toUpperCase()];
  return r !== undefined ? r : 999;
}

// Which fields are SOURCE (typed/retained) for each solve mode.
// The two fields NOT in this set are derived/computed.
const SOURCE_FIELDS = {
  STR: new Set(['atmBid','atmOffer','flyBid','flyOffer']),  // derive strBid + strOffer
  FLY: new Set(['atmBid','atmOffer','strBid','strOffer']),  // derive flyBid + flyOffer
  ATM: new Set(['flyBid','flyOffer','strBid','strOffer']),  // derive atmBid + atmOffer
};

// ── Parser ────────────────────────────────────────────────────────────────

function parseRun(text) {
  const lines = text.trim().split('\n').map(l => l.trim()).filter(Boolean);
  if (!lines.length) return null;

  const header = lines[0];
  const ccyM = header.match(/([A-Z]{3}\/[A-Z]{3})/i);
  if (!ccyM) return { err: `No currency pair found in: "${header}"` };

  const ccy = ccyM[1].toUpperCase();
  const [base, quote] = ccy.split('/');
  const cutM = header.match(/\b([A-Z]{3})\b/gi)
    ?.map(s => s.toUpperCase())
    .find(s => s !== base && s !== quote);
  const cut = cutM || '';

  const flyM = header.match(/\b(\d+D)\s+FLY\b/i);
  const atmM = header.match(/\bATM\b/i);

  let type, delta;
  if      (atmM) { type = 'ATM'; delta = null; }
  else if (flyM) { type = 'FLY'; delta = flyM[1].toUpperCase(); }
  else           { return { err: `Unrecognised structure in header: "${header}"` }; }

  const tenorRe = /^([0-9]+[DWMYdwmy])\s+([0-9.]+)\s*\/\s*([0-9.]+)/;
  const tenors  = {};
  for (let i = 1; i < lines.length; i++) {
    const m = lines[i].match(tenorRe);
    if (m) {
      tenors[m[1].toUpperCase()] = {
        bid: +m[2], offer: +m[3],
        bidStr: m[2], offerStr: m[3],   // original strings preserved for display
      };
    }
  }

  return { ccy, cut, type, delta, tenors };
}

function parseFlyBlock(text) {
  return text.trim()
    .split(/\n[ \t]*\n/)
    .map(b => b.trim())
    .filter(Boolean)
    .map(parseRun)
    .filter(Boolean);
}

// ── Formatting ────────────────────────────────────────────────────────────

function fmt(v) { return v.toFixed(3); }

// ── Solve engine ──────────────────────────────────────────────────────────

function readV(inp)      { const v = parseFloat(inp.value); return isNaN(v) ? null : v; }
function writeV(inp, v)  { inp.value = v !== null ? fmt(v) : ''; }

function solveAndRefresh(row, sectionCtx) {
  const c = row.cells;

  if (row.mode === 'STR') {
    // strangle_bid = atm_bid + fly_bid
    // strangle_offer = atm_offer + fly_offer
    const ab = readV(c.atmBid),  ao = readV(c.atmOffer);
    const fb = readV(c.flyBid),  fo = readV(c.flyOffer);
    writeV(c.strBid,   (ab !== null && fb !== null) ? ab + fb : null);
    writeV(c.strOffer, (ao !== null && fo !== null) ? ao + fo : null);

  } else if (row.mode === 'FLY') {
    // fly_bid   = strangle_bid   - atm_bid
    // fly_offer = strangle_offer - atm_offer
    const ab = readV(c.atmBid),  ao = readV(c.atmOffer);
    const sb = readV(c.strBid),  so = readV(c.strOffer);
    writeV(c.flyBid,   (sb !== null && ab !== null) ? sb - ab : null);
    writeV(c.flyOffer, (so !== null && ao !== null) ? so - ao : null);

  } else { // ATM
    // atm_bid   = strangle_bid   - fly_bid
    // atm_offer = strangle_offer - fly_offer
    const fb = readV(c.flyBid),  fo = readV(c.flyOffer);
    const sb = readV(c.strBid),  so = readV(c.strOffer);
    writeV(c.atmBid,   (sb !== null && fb !== null) ? sb - fb : null);
    writeV(c.atmOffer, (so !== null && fo !== null) ? so - fo : null);
  }

  // Recolor all inputs: source → white, derived → cyan, empty → muted
  const srcSet = SOURCE_FIELDS[row.mode];
  for (const [field, inp] of Object.entries(c)) {
    const v = readV(inp);
    inp.className = v !== null
      ? (srcSet.has(field) ? 'v-src' : 'v-calc')
      : 'v-none';
  }

  // Crossed-market row highlight
  const ab = readV(c.atmBid), ao = readV(c.atmOffer);
  const fb = readV(c.flyBid), fo = readV(c.flyOffer);
  const sb = readV(c.strBid), so = readV(c.strOffer);
  const crossed =
    (ab !== null && ao !== null && ab >= ao) ||
    (fb !== null && fo !== null && fb >= fo) ||
    (sb !== null && so !== null && sb >= so);
  row.tr.classList.toggle('crossed', crossed);

  updateOutput(sectionCtx);
}

function updateOutput({ ccy, cut, delta, rows, outPre }) {
  const header = `${ccy} ${cut} ${delta} STRANGLE`;
  const lines = rows.flatMap(row => {
    const sb = readV(row.cells.strBid);
    const so = readV(row.cells.strOffer);
    return (sb !== null && so !== null)
      ? [`${row.tenor.padEnd(4)} ${fmt(sb)}/${fmt(so)}`]
      : [];
  });
  outPre.textContent = [header, ...lines].join('\n');
}

// ── Render ────────────────────────────────────────────────────────────────

function renderSection(atm, fly) {
  const allTenors = [...new Set([
    ...Object.keys(atm.tenors),
    ...Object.keys(fly.tenors),
  ])].sort((a, b) => tenorRank(a) - tenorRank(b));

  // Section context holds everything needed to refresh the output block.
  const sectionCtx = { ccy: atm.ccy, cut: atm.cut, delta: fly.delta, rows: [], outPre: null };

  const section = document.createElement('div');
  section.className = 'delta-section';

  const title = document.createElement('div');
  title.className = 'section-title';
  title.textContent = `${atm.ccy} ${atm.cut} · ${fly.delta} strangle`;
  section.appendChild(title);

  // ── Table header
  const table = document.createElement('table');
  const thead = table.createTHead();

  const gRow = thead.insertRow();
  gRow.className = 'group-row';
  const thSpan = document.createElement('th');
  thSpan.rowSpan = 2;
  gRow.appendChild(thSpan);
  [['ATM','g-atm',2], ['FLY','g-fly',2], ['STRANGLE','g-strng',2]].forEach(([lbl,cls,span]) => {
    const th = document.createElement('th');
    th.textContent = lbl; th.colSpan = span; th.className = cls;
    gRow.appendChild(th);
  });

  const cRow = thead.insertRow();
  cRow.className = 'col-row';
  const thTenor = document.createElement('th');
  thTenor.textContent = 'Tenor';
  cRow.appendChild(thTenor);
  ['Bid','Offer','Bid','Offer','Bid','Offer'].forEach(lbl => {
    const th = document.createElement('th');
    th.textContent = lbl;
    cRow.appendChild(th);
  });

  // ── Table body
  const tbody = table.createTBody();

  for (const tenor of allTenors) {
    const a = atm.tenors[tenor];   // may be undefined
    const f = fly.tenors[tenor];   // may be undefined

    const initSb = (a && f) ? a.bid + f.bid     : null;
    const initSo = (a && f) ? a.offer + f.offer : null;

    const tr = tbody.insertRow();

    const tdTenor = tr.insertCell();
    tdTenor.className = 'col-tenor';
    tdTenor.textContent = tenor;

    // makeInp: appends a td+input to tr, returns the input element.
    // srcStr: original pasted string (preserves "5.5" vs "5.500"); null for computed values.
    const makeInp = (val, srcStr, isSrc) => {
      const td  = tr.insertCell();
      const inp = document.createElement('input');
      inp.type        = 'text';
      inp.placeholder = '–';
      inp.autocomplete = 'off';
      inp.spellcheck  = false;
      if (val !== null) inp.value = srcStr !== null ? srcStr : fmt(val);
      inp.className = val !== null ? (isSrc ? 'v-src' : 'v-calc') : 'v-none';
      td.appendChild(inp);
      return inp;
    };

    const cells = {
      atmBid:   makeInp(a?.bid   ?? null, a?.bidStr   ?? null, true),
      atmOffer: makeInp(a?.offer ?? null, a?.offerStr ?? null, true),
      flyBid:   makeInp(f?.bid   ?? null, f?.bidStr   ?? null, true),
      flyOffer: makeInp(f?.offer ?? null, f?.offerStr ?? null, true),
      strBid:   makeInp(initSb, null, false),
      strOffer: makeInp(initSo, null, false),
    };

    // Initial crossed check
    if ((a && a.bid >= a.offer) ||
        (f && f.bid >= f.offer) ||
        (initSb !== null && initSo !== null && initSb >= initSo)) {
      tr.classList.add('crossed');
    }

    const row = { tenor, mode: 'STR', cells, tr };
    sectionCtx.rows.push(row);

    // Event wiring: mode update then solve on every keystroke
    for (const [field, inp] of Object.entries(cells)) {
      inp.addEventListener('input', () => {
        if (field === 'strBid' || field === 'strOffer') {
          row.mode = 'FLY';
        } else if (field === 'flyBid' || field === 'flyOffer') {
          row.mode = 'STR';
        } else {
          // ATM edit: keep current derive target; if ATM was derived, revert to STR default
          if (row.mode === 'ATM') row.mode = 'STR';
        }
        solveAndRefresh(row, sectionCtx);
      });
    }
  }

  section.appendChild(table);

  // ── Output block
  const outWrap  = document.createElement('div');
  outWrap.className = 'output-wrap';

  const outHdr = document.createElement('div');
  outHdr.className = 'output-header';

  const outLabel = document.createElement('span');
  outLabel.className = 'output-label';
  outLabel.textContent = 'Output';

  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.textContent = 'Copy';

  const pre = document.createElement('div');
  pre.className = 'output-text';
  sectionCtx.outPre = pre;
  updateOutput(sectionCtx);   // initial render

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(pre.textContent).then(() => {
      copyBtn.textContent = 'Copied';
      copyBtn.classList.add('copied');
      setTimeout(() => { copyBtn.textContent = 'Copy'; copyBtn.classList.remove('copied'); }, 1500);
    });
  });

  outHdr.appendChild(outLabel);
  outHdr.appendChild(copyBtn);
  outWrap.appendChild(outHdr);
  outWrap.appendChild(pre);
  section.appendChild(outWrap);

  return section;
}

// ── Calculate (parse + render) ────────────────────────────────────────────

function calculate() {
  const errEl     = document.getElementById('err');
  const resultsEl = document.getElementById('results');
  errEl.textContent = '';
  resultsEl.innerHTML = '';

  const atmText = document.getElementById('ta-atm').value;
  const flyText = document.getElementById('ta-fly').value;

  if (!atmText.trim() && !flyText.trim()) return;
  if (!atmText.trim()) { errEl.textContent = 'Paste an ATM run on the left.';          return; }
  if (!flyText.trim()) { errEl.textContent = 'Paste at least one Fly run on the right.'; return; }

  const atm = parseRun(atmText);
  if (!atm)              { errEl.textContent = 'Could not parse ATM input.';               return; }
  if (atm.err)           { errEl.textContent = atm.err;                                    return; }
  if (atm.type !== 'ATM'){ errEl.textContent = 'Left textarea must contain the ATM run.';  return; }

  const flyRuns = parseFlyBlock(flyText);
  if (!flyRuns.length)   { errEl.textContent = 'Could not parse any Fly runs.'; return; }
  for (const r of flyRuns) {
    if (r.err)           { errEl.textContent = r.err;                            return; }
    if (r.type !== 'FLY'){ errEl.textContent = `Expected a FLY run, got "${r.type}"`; return; }
  }

  flyRuns.forEach(fly => resultsEl.appendChild(renderSection(atm, fly)));
}

// ── Wire-up ───────────────────────────────────────────────────────────────

document.getElementById('btn-calc').addEventListener('click', calculate);
['ta-atm','ta-fly'].forEach(id =>
  document.getElementById(id).addEventListener('paste', () => setTimeout(calculate, 0))
);

// ── Pre-fill example data ─────────────────────────────────────────────────

document.getElementById('ta-atm').value =
`USD/CHF NYK ATM
1W 5.275/6.925
2W 5.5/6.6
1M 6.025/6.6
2M 6.35/6.875
3M 6.5/7.025
6M 6.675/7.15
9M 6.925/7.4
1Y 7.175/7.675`;

document.getElementById('ta-fly').value =
`USD/CHF NYK 10D FLY
1M 0.475/0.725
2M 0.575/0.8
3M 0.65/0.875
6M 0.85/0.925
9M 0.925/1.15
1Y 1.025/1.25`;

calculate();
</script>
</body>
</html>
