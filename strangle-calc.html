<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Strangle Calculator</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #1a1a2e;
  color: #c8ccd4;
  font-family: 'Courier New', Courier, monospace;
  font-size: 13px;
  padding: 16px 20px;
  min-height: 100vh;
}

h1 {
  color: #5b8de8;
  font-size: 13px;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 14px;
  border-bottom: 1px solid #1e2240;
  padding-bottom: 8px;
}

/* ── Input panel ── */
.input-panel {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.ta-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.ta-label-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.ta-label {
  color: #4a6080;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

button.clr-btn {
  background: transparent;
  border: 1px solid #141e30;
  color: #2a4060;
  cursor: pointer;
  font-family: 'Courier New', Courier, monospace;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 1px 7px;
  text-transform: uppercase;
  transition: all 0.12s;
}
button.clr-btn:hover { border-color: #1e3050; color: #3a6090; }

textarea {
  background: #0f0f1e;
  border: 1px solid #1e2240;
  color: #d0d8e8;
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
  line-height: 1.5;
  padding: 7px 9px;
  resize: vertical;
  height: 190px;
  width: 100%;
  outline: none;
  transition: border-color 0.15s;
}
textarea:focus { border-color: #3a5090; }

.controls {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 18px;
}

button.calc-btn {
  background: #1e2c60;
  border: 1px solid #3a5090;
  color: #7aabff;
  cursor: pointer;
  font-family: 'Courier New', Courier, monospace;
  font-size: 11px;
  letter-spacing: 2px;
  padding: 5px 18px;
  text-transform: uppercase;
  transition: background 0.12s;
}
button.calc-btn:hover { background: #2a3d80; }
button.calc-btn:active { background: #354ca0; }

.error-msg {
  color: #e05050;
  font-size: 11px;
  white-space: pre-wrap;
  line-height: 1.5;
}

/* ── Results ── */
.results { display: flex; flex-direction: column; gap: 22px; }

.section-title {
  color: #4a6080;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 6px;
}

/* ── Table ── */
table {
  border-collapse: collapse;
  width: 100%;
  margin-bottom: 10px;
}

thead tr.group-row th {
  background: #0c0c1a;
  color: #3a5070;
  font-size: 10px;
  letter-spacing: 2px;
  padding: 3px 8px;
  text-align: center;
  text-transform: uppercase;
  border-bottom: 1px solid #1a1a30;
}
thead tr.group-row th.g-atm   { color: #4a7080; border-bottom-color: #2a3050; }
thead tr.group-row th.g-fly   { color: #4a6090; border-bottom-color: #2a3060; }
thead tr.group-row th.g-strng { color: #208080; border-bottom-color: #1a4040; }

thead tr.col-row th {
  background: #0f0f20;
  border-bottom: 1px solid #1e2240;
  color: #344060;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 3px 8px;
  text-align: right;
  text-transform: uppercase;
  white-space: nowrap;
}
thead tr.col-row th.col-tenor-hdr { text-align: left; }

tbody tr { border-bottom: 1px solid #13132a; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover td { background: #141428; }
tbody tr:hover td input { background: transparent; }

tbody tr.crossed td            { background: #251810; }
tbody tr.crossed:hover td      { background: #2d1e12; }
tbody tr.crossed td.col-tenor  { color: #e08030; }

/* ── Reset button column ── */
td.col-reset, thead th.col-reset {
  width: 20px;
  padding: 0 3px;
  text-align: center;
}

button.reset-btn {
  background: transparent;
  border: none;
  color: #252545;
  cursor: pointer;
  font-size: 13px;
  line-height: 1;
  padding: 0 2px;
  transition: color 0.12s;
}
button.reset-btn.dirty { color: #6060a0; }
button.reset-btn.dirty:hover { color: #9090e0; }

td {
  padding: 2px 4px;
  white-space: nowrap;
  vertical-align: middle;
}
td.col-tenor {
  color: #5070a0;
  text-align: left;
  min-width: 42px;
  padding: 2px 10px 2px 6px;
  border-left: 3px solid transparent;
}
/* ── Mode indicator on tenor cell ── */
td.col-tenor.mode-fly { border-left-color: #c08020; }
td.col-tenor.mode-atm { border-left-color: #2060c0; }

/* ── Editable vol inputs ── */
td input {
  background: transparent;
  border: none;
  border-bottom: 1px solid transparent;
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
  outline: none;
  padding: 2px 2px 1px;
  text-align: right;
  width: 58px;
  transition: border-bottom-color 0.1s;
}
td input:focus { border-bottom-color: #2a4878; }
td input::placeholder { color: #252545; }

/* color classes applied to inputs */
.v-src  { color: #e8e8f0; }
.v-calc { color: #4fc3f7; }
.v-none { color: #252545; }

/* invalid (non-numeric) input — overrides base color */
td input.v-invalid {
  color: #ff7070;
  background: rgba(224, 80, 80, 0.18);
  border-bottom-color: #c04040;
}
td input.v-invalid:focus { border-bottom-color: #e05050; }

/* negative-vol overlays — applied on top of base color */
td input.v-neg-err  { color: #ff8080; background: rgba(224, 80, 80, 0.10); }
td input.v-neg-warn { color: #f0b040; background: rgba(224, 160, 80, 0.10); }

/* ── Shift row ── */
thead tr.shift-row th {
  background: #0c0c1a;
  padding: 3px 4px;
  border-top: 1px solid #1a1a30;
}
thead tr.shift-row th.shift-label {
  color: #2a3a50;
  font-size: 9px;
  letter-spacing: 2px;
  text-align: left;
  text-transform: uppercase;
  padding-left: 4px;
}
thead tr.shift-row th input.shift-inp {
  background: transparent;
  border: none;
  border-bottom: 1px solid #1e2240;
  color: #3a5070;
  font-family: 'Courier New', Courier, monospace;
  font-size: 11px;
  outline: none;
  padding: 1px 2px;
  text-align: right;
  width: 58px;
  transition: border-bottom-color 0.1s;
}
thead tr.shift-row th input.shift-inp:focus {
  border-bottom-color: #3a5090;
  color: #7090b0;
}
thead tr.shift-row th input.shift-inp::placeholder { color: #1e2840; }

/* ── Output block ── */
.output-wrap {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.output-header {
  display: flex;
  align-items: center;
  gap: 10px;
}

.output-label {
  color: #344060;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

button.copy-btn {
  background: transparent;
  border: 1px solid #1e3050;
  color: #3a6090;
  cursor: pointer;
  font-family: 'Courier New', Courier, monospace;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 2px 10px;
  text-transform: uppercase;
  transition: all 0.12s;
}
button.copy-btn:hover  { border-color: #3a5090; color: #5a90c0; }
button.copy-btn.copied { border-color: #206040; color: #30c060; }

.output-text {
  background: #0c0c1a;
  border: 1px solid #1a1a30;
  color: #5090a0;
  font-family: 'Courier New', Courier, monospace;
  font-size: 12px;
  line-height: 1.6;
  padding: 7px 9px;
  white-space: pre;
}

/* ── Crossed implied fly ── */
.crossed-fly-warn {
  color: #d08020;
  cursor: help;
  font-size: 10px;
  margin-left: 5px;
}

button.solve-atm-btn {
  background: transparent;
  border: 1px solid #1e3050;
  color: #3a6090;
  cursor: pointer;
  font-family: 'Courier New', Courier, monospace;
  font-size: 9px;
  letter-spacing: 0;
  margin-left: 4px;
  padding: 0 4px;
  transition: all 0.12s;
  vertical-align: middle;
}
button.solve-atm-btn:hover { border-color: #3a6090; color: #6a90d0; }
button.solve-atm-btn.active { border-color: #2060c0; color: #4090e0; }

tbody tr.crossed-implied-fly td           { background: #1e1508; }
tbody tr.crossed-implied-fly:hover td     { background: #252010; }
tbody tr.crossed-implied-fly td.col-tenor { color: #d08020; }

.copy-btn.warn-cross       { border-color: #604010; color: #c08020; }
.copy-btn.warn-cross:hover { border-color: #c08020; color: #e0a030; }
</style>
</head>
<body>

<h1>FX Strangle Calculator</h1>

<div class="input-panel">
  <div class="ta-wrap">
    <div class="ta-label-row">
      <div class="ta-label">ATM Run</div>
      <button class="clr-btn" id="clr-atm">CLR</button>
    </div>
    <textarea id="ta-atm" spellcheck="false"
      placeholder="Paste ATM run here&#10;e.g. USD/CHF NYK ATM&#10;1M 6.025/6.6&#10;..."></textarea>
  </div>
  <div class="ta-wrap">
    <div class="ta-label-row">
      <div class="ta-label">Fly Run(s) — paste one or two deltas</div>
      <button class="clr-btn" id="clr-fly">CLR</button>
    </div>
    <textarea id="ta-fly" spellcheck="false"
      placeholder="Paste fly run(s) here&#10;e.g. USD/CHF NYK 10D FLY&#10;1M 0.475/0.725&#10;...&#10;&#10;USD/CHF NYK 25D FLY&#10;1M 0.850/1.100&#10;...&#10;&#10;Any delta (5D, 10D, 15D, 25D...) — separate runs with a blank line"></textarea>
  </div>
</div>

<div class="controls">
  <button class="calc-btn" id="btn-calc">Calculate</button>
  <span class="error-msg" id="err"></span>
</div>

<div class="results" id="results"></div>

<script src="strangle-calc-core.js"></script>
<script>
// ── Bind pure logic from the core module ──────────────────────────────────

const {
  tenorRank, isStrictNumber, strictNumber, cellState, fmt,
  parseRun, parseFlyBlock, parseATM,
  validateCompatibility,
  SOURCE_FIELDS: CORE_SOURCE_FIELDS, solve, rowFlags, impliedCrossDetails,
  formatStrangleOutput,
} = window.StrangleCore;

// Convert to Sets for fast field membership checks in the UI layer.
const SOURCE_FIELDS = {
  STR: new Set(CORE_SOURCE_FIELDS.STR),
  FLY: new Set(CORE_SOURCE_FIELDS.FLY),
  ATM: new Set(CORE_SOURCE_FIELDS.ATM),
};

// ── Input value helpers ───────────────────────────────────────────────────
// readV — usable numeric value or null. Treats blank AND invalid as null
// (invalid cells are still highlighted; the solver just won't consume them).
function readV(inp)     { return strictNumber(inp.value); }
function writeV(inp, v) { inp.value = v !== null ? fmt(v) : ''; }

// ── Change flash ───────────────────────────────────────────────────────────

const FLASH_HOLD_MS = 14000;   // stay gold for 14s
const FLASH_FADE_MS = 1000;    // then fade back over 1s (total ~15s)
const FLASH_COLOR   = '#f0b040';

function flashChanged(inp) {
  if (readV(inp) === null) return;   // don't flash empty cells
  if (inp._ft) { clearTimeout(inp._ft); clearTimeout(inp._ft2); }
  // Snap to gold immediately (suppress any ongoing color transition)
  inp.style.transition = 'border-bottom-color 0.1s';
  inp.style.color = FLASH_COLOR;
  // After hold period, enable fade and remove inline color
  inp._ft = setTimeout(() => {
    inp.style.transition = 'border-bottom-color 0.1s, color ' + FLASH_FADE_MS + 'ms';
    inp.style.color = '';
    // Clean up transition override once fade completes
    inp._ft2 = setTimeout(() => {
      inp.style.transition = '';
      inp._ft = inp._ft2 = null;
    }, FLASH_FADE_MS);
  }, FLASH_HOLD_MS);
}

// ── Reset button helpers ───────────────────────────────────────────────────

function isPristine(row) {
  if (row.mode !== 'STR') return false;
  for (const field of ['atmBid','atmOffer','flyBid','flyOffer']) {
    const cur  = readV(row.cells[field]);
    const orig = row.originals[field];
    if (cur === null && orig === null) continue;
    if (cur === null || orig === null) return false;
    if (Math.abs(cur - orig) > 1e-9) return false;
  }
  return true;
}

function updateResetBtn(row) {
  const p = isPristine(row);
  row.resetBtn.classList.toggle('dirty', !p);
  row.resetBtn.disabled = p;
}

// Apply v-src / v-calc / v-none / v-invalid base classes plus
// v-neg-err / v-neg-warn overlays. Also updates the crossed-row flag,
// mode indicator, and crossed-implied-fly warning badge.
// No flashing — that's done by the caller.
function recolorRow(row) {
  const c = row.cells;
  const srcSet = SOURCE_FIELDS[row.mode];
  const vals = {
    atmBid:   readV(c.atmBid),   atmOffer: readV(c.atmOffer),
    flyBid:   readV(c.flyBid),   flyOffer: readV(c.flyOffer),
    strBid:   readV(c.strBid),   strOffer: readV(c.strOffer),
  };
  const flags = rowFlags(vals);
  const negByField = {
    atmBid:   flags.negAtmBid   ? 'v-neg-err'  : null,
    atmOffer: flags.negAtmOffer ? 'v-neg-err'  : null,
    flyBid:   flags.negFlyBid   ? 'v-neg-warn' : null,
    flyOffer: flags.negFlyOffer ? 'v-neg-warn' : null,
    strBid:   flags.negStrBid   ? 'v-neg-err'  : null,
    strOffer: flags.negStrOffer ? 'v-neg-err'  : null,
  };
  for (const [field, inp] of Object.entries(c)) {
    const state = cellState(inp.value);
    let base;
    if (state === 'empty')        base = 'v-none';
    else if (state === 'invalid') base = 'v-invalid';
    else                          base = srcSet.has(field) ? 'v-src' : 'v-calc';
    const overlay = (state === 'ok') ? negByField[field] : null;
    inp.className = overlay ? `${base} ${overlay}` : base;
  }

  // Crossed implied fly: strangle editing (FLY mode) produced a crossed fly.
  // Give it amber styling distinct from the generic red crossed-market row.
  const isCrossedImpliedFly = row.mode === 'FLY' && flags.crossedFly;
  row.tr.classList.toggle(
    'crossed',
    flags.crossedATM || flags.crossedStr || (flags.crossedFly && !isCrossedImpliedFly)
  );
  row.tr.classList.toggle('crossed-implied-fly', isCrossedImpliedFly);

  row.tdTenor.classList.toggle('mode-fly', row.mode === 'FLY');
  row.tdTenor.classList.toggle('mode-atm', row.mode === 'ATM');

  // Warning badge — only in FLY mode with a crossed fly result.
  if (row.warnBadge) {
    row.warnBadge.hidden = !isCrossedImpliedFly;
    if (isCrossedImpliedFly) {
      const d = impliedCrossDetails(vals);
      if (d) {
        row.warnBadge.title = [
          'Crossed implied fly: strangle spread is narrower than ATM spread.',
          '',
          `fly_bid   = strBid − atmBid   = ${fmt(d.strBid)} − ${fmt(d.atmBid)} = ${fmt(d.flyBid)}`,
          `fly_offer = strOffer − atmOffer = ${fmt(d.strOffer)} − ${fmt(d.atmOffer)} = ${fmt(d.flyOffer)}`,
          '',
          `strangle spread = ${fmt(d.strOffer)} − ${fmt(d.strBid)} = ${fmt(d.strSpread)}`,
          `ATM spread      = ${fmt(d.atmOffer)} − ${fmt(d.atmBid)} = ${fmt(d.atmSpread)}`,
          `strangle spread (${fmt(d.strSpread)}) < ATM spread (${fmt(d.atmSpread)}) → fly bid ≥ fly offer`,
          '',
          'Options:',
          '• Raise strangle offer',
          '• Lower strangle bid',
          '• Widen strangle market (do both)',
          '• Click →ATM to solve for ATM from fly + strangle',
        ].join('\n');
      }
    }
  }

  // Solve-for-ATM button is available whenever strangle is driving the row (FLY mode).
  if (row.solveAtmBtn) {
    row.solveAtmBtn.hidden = row.mode !== 'FLY';
    row.solveAtmBtn.classList.toggle('active', row.mode === 'ATM');
  }
}

function solveAndRefresh(row, sectionCtx) {
  const c = row.cells;
  const srcSet = SOURCE_FIELDS[row.mode];

  // Solve: readV returns null for empty AND for non-numeric junk, so an
  // invalid source cell produces a blank derived cell rather than NaN.
  const vals = {
    atmBid:   readV(c.atmBid),   atmOffer: readV(c.atmOffer),
    flyBid:   readV(c.flyBid),   flyOffer: readV(c.flyOffer),
    strBid:   readV(c.strBid),   strOffer: readV(c.strOffer),
  };
  const out = solve(row.mode, vals);
  for (const field of ['atmBid','atmOffer','flyBid','flyOffer','strBid','strOffer']) {
    if (!srcSet.has(field)) writeV(c[field], out[field]);
  }

  // Flash derived cells — they just changed.
  for (const [field, inp] of Object.entries(c)) {
    if (!srcSet.has(field)) flashChanged(inp);
  }

  recolorRow(row);
  updateResetBtn(row);
  updateOutput(sectionCtx);
}

function updateOutput({ ccy, cut, delta, rows, outPre, copyBtn }) {
  const outRows = rows.map(row => ({
    tenor: row.tenor,
    strBid: readV(row.cells.strBid),
    strOffer: readV(row.cells.strOffer),
  }));
  outPre.textContent = formatStrangleOutput(ccy, cut, delta, outRows);

  if (!copyBtn || copyBtn.classList.contains('copied')) return;
  const hasCrossed = rows.some(row => {
    const v = {
      atmBid: readV(row.cells.atmBid), atmOffer: readV(row.cells.atmOffer),
      flyBid: readV(row.cells.flyBid), flyOffer: readV(row.cells.flyOffer),
      strBid: readV(row.cells.strBid), strOffer: readV(row.cells.strOffer),
    };
    const f = rowFlags(v);
    return f.crossedATM || f.crossedFly || f.crossedStr;
  });
  copyBtn.classList.toggle('warn-cross', hasCrossed);
  copyBtn.title = hasCrossed
    ? 'One or more rows have crossed implied values — review before use'
    : '';
  copyBtn.textContent = hasCrossed ? '⚠ Copy' : 'Copy';
}

// ── Render ────────────────────────────────────────────────────────────────

function renderSection(atm, fly) {
  const allTenors = [...new Set([
    ...Object.keys(atm.tenors),
    ...Object.keys(fly.tenors),
  ])].sort((a, b) => tenorRank(a) - tenorRank(b));

  // Section context holds everything needed to refresh the output block.
  const sectionCtx = { ccy: atm.ccy, cut: atm.cut, delta: fly.delta, rows: [], outPre: null, copyBtn: null };

  const section = document.createElement('div');
  section.className = 'delta-section';

  const title = document.createElement('div');
  title.className = 'section-title';
  title.textContent = `${atm.ccy} ${atm.cut} · ${fly.delta} strangle`;
  section.appendChild(title);

  // ── Table header
  const table = document.createElement('table');
  const thead = table.createTHead();

  const gRow = thead.insertRow();
  gRow.className = 'group-row';
  // Leading blank th spanning all 3 thead rows (reset col + shift row)
  const thReset = document.createElement('th');
  thReset.rowSpan = 3;
  thReset.className = 'col-reset';
  gRow.appendChild(thReset);
  [['ATM','g-atm',2], ['FLY','g-fly',2], ['STRANGLE','g-strng',2]].forEach(([lbl,cls,span]) => {
    const th = document.createElement('th');
    th.textContent = lbl; th.colSpan = span; th.className = cls;
    gRow.appendChild(th);
  });

  const cRow = thead.insertRow();
  cRow.className = 'col-row';
  const thTenor = document.createElement('th');
  thTenor.textContent = 'Tenor';
  thTenor.className = 'col-tenor-hdr';
  cRow.appendChild(thTenor);
  ['Bid','Offer','Bid','Offer','Bid','Offer'].forEach(lbl => {
    const th = document.createElement('th');
    th.textContent = lbl;
    cRow.appendChild(th);
  });

  // ── Shift row
  const shiftRow = thead.insertRow();
  shiftRow.className = 'shift-row';
  const thShiftLabel = document.createElement('th');
  thShiftLabel.className = 'shift-label';
  thShiftLabel.textContent = 'SHIFT';
  shiftRow.appendChild(thShiftLabel);

  const FIELD_ORDER = ['atmBid','atmOffer','flyBid','flyOffer','strBid','strOffer'];
  const shiftInputs = {};
  for (const field of FIELD_ORDER) {
    const th  = document.createElement('th');
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'shift-inp';
    inp.placeholder = '±';
    inp.autocomplete = 'off';
    inp.spellcheck = false;
    th.appendChild(inp);
    shiftRow.appendChild(th);
    shiftInputs[field] = inp;
  }

  // ── Table body
  const tbody = table.createTBody();

  for (const tenor of allTenors) {
    const a = atm.tenors[tenor];   // may be undefined
    const f = fly.tenors[tenor];   // may be undefined

    const initSb = (a && f) ? a.bid + f.bid     : null;
    const initSo = (a && f) ? a.offer + f.offer : null;

    // Snapshot original values for the reset button
    const originals = {
      atmBid:   a?.bid    ?? null,  atmOffer: a?.offer  ?? null,
      flyBid:   f?.bid    ?? null,  flyOffer: f?.offer  ?? null,
    };
    const origStrings = {
      atmBid:   a?.bidStr   ?? null,  atmOffer: a?.offerStr ?? null,
      flyBid:   f?.bidStr   ?? null,  flyOffer: f?.offerStr ?? null,
    };

    const tr = tbody.insertRow();

    // Reset button cell — inserted first so it's cells[0]
    const tdReset = tr.insertCell();
    tdReset.className = 'col-reset';
    const resetBtn = document.createElement('button');
    resetBtn.className = 'reset-btn';
    resetBtn.textContent = '↺';
    resetBtn.title = 'Reset to original values';
    tdReset.appendChild(resetBtn);

    const tdTenor = tr.insertCell();
    tdTenor.className = 'col-tenor';
    const tenorSpan = document.createElement('span');
    tenorSpan.textContent = tenor;
    tdTenor.appendChild(tenorSpan);

    const warnBadge = document.createElement('span');
    warnBadge.className = 'crossed-fly-warn';
    warnBadge.textContent = '⚠';
    warnBadge.hidden = true;
    tdTenor.appendChild(warnBadge);

    const solveAtmBtn = document.createElement('button');
    solveAtmBtn.className = 'solve-atm-btn';
    solveAtmBtn.textContent = '→ATM';
    solveAtmBtn.title = 'Solve for ATM using fly + strangle as inputs';
    solveAtmBtn.hidden = true;
    tdTenor.appendChild(solveAtmBtn);

    // makeInp: appends a td+input to tr, returns the input element.
    // srcStr: original pasted string (preserves "5.5" vs "5.500"); null for computed values.
    const makeInp = (val, srcStr, isSrc) => {
      const td  = tr.insertCell();
      const inp = document.createElement('input');
      inp.type        = 'text';
      inp.placeholder = '–';
      inp.autocomplete = 'off';
      inp.spellcheck  = false;
      if (val !== null) inp.value = srcStr !== null ? srcStr : fmt(val);
      inp.className = val !== null ? (isSrc ? 'v-src' : 'v-calc') : 'v-none';
      td.appendChild(inp);
      return inp;
    };

    const cells = {
      atmBid:   makeInp(a?.bid   ?? null, a?.bidStr   ?? null, true),
      atmOffer: makeInp(a?.offer ?? null, a?.offerStr ?? null, true),
      flyBid:   makeInp(f?.bid   ?? null, f?.bidStr   ?? null, true),
      flyOffer: makeInp(f?.offer ?? null, f?.offerStr ?? null, true),
      strBid:   makeInp(initSb, null, false),
      strOffer: makeInp(initSo, null, false),
    };

    const row = { tenor, mode: 'STR', cells, tr, tdTenor, resetBtn, warnBadge, solveAtmBtn, originals, origStrings };
    sectionCtx.rows.push(row);

    // Initial classes: crossed-row flag + negative-vol overlays
    recolorRow(row);

    // Reset button: restore original values and re-solve in STR mode
    resetBtn.addEventListener('click', () => {
      row.mode = 'STR';
      for (const field of ['atmBid','atmOffer','flyBid','flyOffer']) {
        const s = row.origStrings[field];
        const v = row.originals[field];
        row.cells[field].value = s !== null ? s : (v !== null ? fmt(v) : '');
        row.cells[field].className = v !== null ? 'v-src' : 'v-none';
        flashChanged(row.cells[field]);   // flash each restored source cell
      }
      solveAndRefresh(row, sectionCtx);  // derived cells also flash inside
    });
    updateResetBtn(row);   // start dimmed (all rows pristine on initial render)

    // Solve for ATM: user explicitly switches this row to derive ATM from fly + strangle.
    solveAtmBtn.addEventListener('click', () => {
      row.mode = 'ATM';
      solveAndRefresh(row, sectionCtx);
    });

    // Event wiring: mode update then solve on every keystroke
    for (const [field, inp] of Object.entries(cells)) {
      inp.addEventListener('input', () => {
        if (field === 'strBid' || field === 'strOffer') {
          row.mode = 'FLY';   // strangle edited → derive fly
        } else if (field === 'flyBid' || field === 'flyOffer') {
          row.mode = 'STR';   // fly edited → derive strangle
        } else {
          // ATM edited: if strangle is already fixed (FLY mode), keep strangle+fly as
          // sources and derive ATM; otherwise recompute strangle from ATM+fly (STR mode)
          if (row.mode === 'FLY') row.mode = 'ATM';
          else                    row.mode = 'STR';
        }
        flashChanged(inp);   // flash the cell being edited
        solveAndRefresh(row, sectionCtx);
      });
    }
  }

  // ── Shift row apply logic
  for (const [field, shiftInp] of Object.entries(shiftInputs)) {
    shiftInp.addEventListener('keydown', e => {
      if (e.key !== 'Enter') return;
      const delta = parseFloat(shiftInp.value);
      shiftInp.value = '';
      if (isNaN(delta) || delta === 0) return;

      for (const row of sectionCtx.rows) {
        if (!SOURCE_FIELDS[row.mode].has(field)) continue;
        const cur = readV(row.cells[field]);
        if (cur === null) continue;
        // Round to avoid float drift (e.g. 6.025 + 0.1 → 6.125 not 6.124999...)
        row.cells[field].value = fmt(Math.round((cur + delta) * 1e6) / 1e6);
        flashChanged(row.cells[field]);   // flash each shifted cell
      }
      for (const row of sectionCtx.rows) {
        solveAndRefresh(row, sectionCtx);  // derived cells also flash inside
      }
    });
  }

  // ── Arrow-key / Enter navigation ─────────────────────────────────────────
  // Build a 2-D grid [row][col] of input elements so we can move between cells.
  // FIELD_ORDER already defined above for the shift row.
  const grid = sectionCtx.rows.map(row =>
    FIELD_ORDER.map(field => row.cells[field])
  );
  const nRows = grid.length;
  const nCols = FIELD_ORDER.length;

  for (let r = 0; r < nRows; r++) {
    for (let c = 0; c < nCols; c++) {
      const inp = grid[r][c];
      inp.addEventListener('keydown', e => {
        let nr = r, nc = c;
        switch (e.key) {
          case 'ArrowUp':
            nr = r - 1;
            break;
          case 'ArrowDown':
            nr = r + 1;
            break;
          case 'Enter':
            nr = e.shiftKey ? r - 1 : r + 1;
            break;
          case 'ArrowLeft':
            // only navigate when cursor is already at the start of the text
            if (inp.selectionStart !== 0 || inp.selectionEnd !== 0) return;
            nc = c - 1;
            if (nc < 0) { nr = r - 1; nc = nCols - 1; }
            break;
          case 'ArrowRight':
            // only navigate when cursor is already at the end of the text
            if (inp.selectionStart !== inp.value.length) return;
            nc = c + 1;
            if (nc >= nCols) { nr = r + 1; nc = 0; }
            break;
          default: return;
        }
        if (nr < 0 || nr >= nRows || nc < 0 || nc >= nCols) return;
        e.preventDefault();
        const target = grid[nr][nc];
        target.focus();
        target.select();
      });
    }
  }

  section.appendChild(table);

  // ── Output block
  const outWrap  = document.createElement('div');
  outWrap.className = 'output-wrap';

  const outHdr = document.createElement('div');
  outHdr.className = 'output-header';

  const outLabel = document.createElement('span');
  outLabel.className = 'output-label';
  outLabel.textContent = 'Output';

  const copyBtn = document.createElement('button');
  copyBtn.className = 'copy-btn';
  copyBtn.textContent = 'Copy';
  sectionCtx.copyBtn = copyBtn;   // register before updateOutput so initial state is set

  const pre = document.createElement('div');
  pre.className = 'output-text';
  sectionCtx.outPre = pre;
  updateOutput(sectionCtx);   // initial render

  copyBtn.addEventListener('click', () => {
    const crossedTenors = sectionCtx.rows
      .filter(row => {
        const v = {
          atmBid: readV(row.cells.atmBid), atmOffer: readV(row.cells.atmOffer),
          flyBid: readV(row.cells.flyBid), flyOffer: readV(row.cells.flyOffer),
          strBid: readV(row.cells.strBid), strOffer: readV(row.cells.strOffer),
        };
        const f = rowFlags(v);
        return f.crossedATM || f.crossedFly || f.crossedStr;
      })
      .map(r => r.tenor);

    if (crossedTenors.length > 0) {
      const ok = window.confirm(
        `Crossed implied values in: ${crossedTenors.join(', ')}.\n\n` +
        `Review highlighted rows before using this output in a live workflow.\n\n` +
        `Copy anyway?`
      );
      if (!ok) return;
    }

    navigator.clipboard.writeText(pre.textContent).then(() => {
      const prefix = copyBtn.classList.contains('warn-cross') ? '⚠ ' : '';
      copyBtn.textContent = prefix + 'Copied';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.classList.remove('copied');
        updateOutput(sectionCtx);   // restore label and warn state
      }, 1500);
    });
  });

  outHdr.appendChild(outLabel);
  outHdr.appendChild(copyBtn);
  outWrap.appendChild(outHdr);
  outWrap.appendChild(pre);
  section.appendChild(outWrap);

  return section;
}

// ── Calculate (parse + render) ────────────────────────────────────────────

function calculate() {
  const errEl     = document.getElementById('err');
  const resultsEl = document.getElementById('results');
  errEl.textContent = '';
  resultsEl.innerHTML = '';

  const atmText = document.getElementById('ta-atm').value;
  const flyText = document.getElementById('ta-fly').value;

  if (!atmText.trim() && !flyText.trim()) return;
  if (!atmText.trim()) { errEl.textContent = 'Paste an ATM run on the left.';            return; }
  if (!flyText.trim()) { errEl.textContent = 'Paste at least one Fly run on the right.'; return; }

  const errors = [];

  const atmRes = parseATM(atmText);
  if (!atmRes) { errEl.textContent = 'Could not parse ATM input.'; return; }
  if (!atmRes.ok) {
    errEl.textContent = atmRes.errors.map(e => `ATM: ${e}`).join('\n');
    return;
  }
  const atm = atmRes.run;

  const flyRes = parseFlyBlock(flyText);
  if (!flyRes.ok) errors.push(...flyRes.errors.map(e => `Fly: ${e}`));
  if (!flyRes.runs.length && flyRes.ok) {
    errEl.textContent = 'Could not parse any Fly runs.';
    return;
  }

  for (const fly of flyRes.runs) {
    const compatErrs = validateCompatibility(atm, fly);
    if (compatErrs.length) {
      errors.push(...compatErrs);
      continue;   // skip this fly section entirely
    }
    resultsEl.appendChild(renderSection(atm, fly));
  }

  errEl.textContent = errors.join('\n');
}

// ── Wire-up ───────────────────────────────────────────────────────────────

document.getElementById('btn-calc').addEventListener('click', calculate);

let _calcTimer = null;
let _pasteActive = false;
['ta-atm','ta-fly'].forEach(id => {
  const el = document.getElementById(id);
  // Paste: run immediately after the value is committed (next tick)
  el.addEventListener('paste', () => {
    _pasteActive = true;
    clearTimeout(_calcTimer);
    _calcTimer = setTimeout(() => { _pasteActive = false; calculate(); }, 0);
  });
  // Typing: debounce so we don't recalculate on every keystroke;
  // skip if a paste is already queued (input fires right after paste)
  el.addEventListener('input', () => {
    if (_pasteActive) return;
    clearTimeout(_calcTimer);
    _calcTimer = setTimeout(calculate, 300);
  });
});

document.getElementById('clr-atm').addEventListener('click', () => {
  document.getElementById('ta-atm').value = '';
  calculate();
});
document.getElementById('clr-fly').addEventListener('click', () => {
  document.getElementById('ta-fly').value = '';
  calculate();
});

</script>
